<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Tours</title>
    <link rel="stylesheet" href="/static/css/site.css" />
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }
        
        .admin-sidebar {
            width: 220px;
            background: #513a8b;
            color: white;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .admin-sidebar .logo {
            padding: 0 20px;
            margin-bottom: 30px;
        }
        
        .admin-sidebar .logo-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .admin-sidebar .logo-title .g-circle {
            width: 32px;
            height: 32px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .admin-sidebar .logo-sub {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        .admin-sidebar .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            padding: 0 20px;
            margin: 20px 0 10px;
        }
        
        .admin-sidebar nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
        }
        
        .admin-sidebar nav a:hover,
        .admin-sidebar nav a.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .admin-sidebar nav a.active {
            border-left: 3px solid white;
        }
        
        .admin-sidebar .logout {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            padding: 0 25px;
        }
        
        .admin-sidebar .logout a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
        }
        
        .admin-sidebar .logout a:hover {
            color: white;
        }
        
        .admin-main {
            margin-left: 220px;
            flex: 1;
            padding: 30px 40px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .admin-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            color: #333;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        
        .btn-primary {
            background: #513a8b;
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            background: #3d2b6b;
        }
        
        .btn-danger {
            background: #e41e26;
            color: white;
            border: none;
        }
        
        .btn-secondary {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .admin-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .admin-table th {
            background: #f8f8f8;
            padding: 14px 20px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            font-weight: 600;
        }
        
        .admin-table td {
            padding: 16px 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 14px;
            color: #333;
        }
        
        .admin-table tr:hover {
            background: #fafafa;
        }
        
        .admin-table .actions {
            display: flex;
            gap: 10px;
        }
        
        .admin-table .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state svg {
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .admin-sidebar {
                width: 60px;
                padding: 20px 0;
            }
            
            .admin-sidebar .logo-text,
            .admin-sidebar .label,
            .admin-sidebar nav a span {
                display: none;
            }
            
            .admin-sidebar .logo {
                justify-content: center;
                padding: 0;
            }
            
            .admin-sidebar nav a {
                justify-content: center;
                padding: 15px;
            }
            
            .admin-main {
                margin-left: 60px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <a href="/" class="logo" style="text-decoration:none;color:inherit;">
                <div class="logo-title">
                    <span class="g-circle">G</span>
                    <span>G Adventures</span>
                </div>
                <div class="logo-sub">Admin Panel</div>
            </a>
            
            <div class="label">Management</div>
            <nav>
                <a href="/admin/tours" class="active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="10" r="3"></circle>
                        <path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"></path>
                    </svg>
                    <span>Tours</span>
                </a>
                <a href="/placeholder">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                    </svg>
                    <span>Users</span>
                </a>
                <a href="/placeholder">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                    </svg>
                    <span>Bookings</span>
                </a>
            </nav>
            
            <div class="logout">
                <a href="/">← Back to Site</a>
            </div>
        </aside>
        
        <main class="admin-main">
            <div class="admin-header">
                <h1>Tours Management</h1>
                <a href="/admin/tours/create" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add New Tour
                </a>
            </div>
            
            <div class="admin-card">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tour Name</th>
                            <th>Duration</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{#each Tours}}
                        <tr>
                            <td>#{{Id}}</td>
                            <td><strong>{{Name}}</strong></td>
                            <td>{{Days}} days</td>
                            <td>${{Price}}</td>
                            <td class="actions">
                                <a href="/admin/tours/edit/{{Id}}" class="btn btn-secondary btn-small">Edit</a>
                                <form method="post" action="/admin/tours/delete/{{Id}}" style="display:inline;" 
                                      onsubmit="return confirm('Are you sure you want to delete this tour?');">
                                    <button type="submit" class="btn btn-danger btn-small">Delete</button>
                                </form>
                            </td>
                        </tr>
                        {{/each}}
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
