<!-- Views/Account/ResetPassword.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля - TourSearch</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <div class="container">
        <div class="auth-form">
            <h2>Установка нового пароля</h2>

            {{#if ErrorMessage}}
            <div class="alert alert-error">
                {{ErrorMessage}}
            </div>
            {{/if}}

            <form method="post" action="/account/reset-password?token={{Token}}">
                <div class="form-group">
                    <label for="password">Новый пароль:</label>
                    <input type="password" id="password" name="password" required
                           pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
                           title="Минимум 8 символов, заглавная и строчная буква, цифра">
                </div>

                <div class="form-group">
                    <label for="confirm">Подтвердите пароль:</label>
                    <input type="password" id="confirm" name="confirm" required>
                </div>

                <button type="submit" class="btn btn-primary">Сбросить пароль</button>
            </form>
        </div>
    </div>
</body>
</html>
