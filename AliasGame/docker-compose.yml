version: '3.8'

services:
  
  postgres:
    image: postgres:16-alpine
    container_name: alias_db
    environment:
      POSTGRES_DB: alias_game
      POSTGRES_USER: alias_user
      POSTGRES_PASSWORD: alias_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./Database/02_seed_words_part1.sql:/docker-entrypoint-initdb.d/02_seed_words_part1.sql
      - ./Database/03_seed_words_part2.sql:/docker-entrypoint-initdb.d/03_seed_words_part2.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alias_user -d alias_game"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alias_network

  
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alias_server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      Database__ConnectionString: "Host=postgres;Port=5432;Database=alias_game;Username=alias_user;Password=alias_password"
      Server__Host: "0.0.0.0"
      Server__Port: "7777"
    ports:
      - "7777:7777"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - alias_network

  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: alias_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alias.game
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - alias_network
    profiles:
      - admin

volumes:
  postgres_data:

networks:
  alias_network:
    driver: bridge
